<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syngenta AI Intelligence Platform</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Custom Premium Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top p-3 mb-4">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <i class="fa-solid fa-seedling text-success"></i>
            Syngenta AI
        </a>
        <div class="d-flex align-items-center gap-3">
            <form class="d-flex" onsubmit="searchRetailer(event)">
                <input class="form-control me-2 rounded-pill bg-dark text-white border-secondary" type="search" id="retailerSearch" placeholder="Search ID (e.g. RTL_00001)" aria-label="Search" style="width: 250px;">
                <button class="btn btn-outline-primary rounded-pill px-3" type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
            </form>
            <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 p-2 px-3 rounded-pill">
                <i class="fa-solid fa-robot me-2"></i>AI Copilot Active
            </span>
        </div>
    </div>
</nav>

<div class="container-fluid px-4">
    {% block content %}{% endblock %}
</div>

<!-- CHATBOT -->
<div class="chatbot-container shadow-lg" id="chatbotContainer">
    <div class="chat-header d-flex justify-content-between align-items-center" style="cursor: pointer;" onclick="toggleChat()">
        <div><i class="fa-solid fa-microchip me-2"></i>Syngenta AI Copilot</div>
        <i class="fa-solid fa-minus" id="chatToggleIcon"></i>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="message ai">Hello! I am your AI Copilot. I can help you analyze retailers, check inventory, and prioritize actions. Try asking "Which retailers are high priority?" or "rtl_100 health".</div>
    </div>
    <div class="chat-input" id="chatInputContainer">
        <button class="btn btn-outline-secondary border-0" id="micBtn" onclick="startVoice()" title="Voice Typing"><i class="fa-solid fa-microphone"></i></button>
        <input type="text" id="chatInput" placeholder="Ask AI anything..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
</div>

<script>
    function startVoice() {
        const micBtn = document.getElementById('micBtn');
        const input = document.getElementById('chatInput');
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Your browser doesn't support voice recognition. Please use Chrome.");
            return;
        }
        
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        
        recognition.onstart = function() {
            micBtn.classList.remove('btn-outline-secondary');
            micBtn.classList.add('text-danger', 'fa-fade');
            input.placeholder = "Listening...";
        };
        
        recognition.onresult = function(event) {
            const speechResult = event.results[0][0].transcript;
            input.value = speechResult;
            sendMessage();
        };
        
        recognition.onspeechend = function() {
            recognition.stop();
        };
        
        recognition.onerror = function(event) {
            micBtn.classList.add('btn-outline-secondary');
            micBtn.classList.remove('text-danger', 'fa-fade');
            input.placeholder = "Ask AI anything...";
        };
        
        recognition.onend = function() {
            micBtn.classList.add('btn-outline-secondary');
            micBtn.classList.remove('text-danger', 'fa-fade');
            input.placeholder = "Ask AI anything...";
        };
        
        recognition.start();
    }

    function toggleChat() {
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInputContainer');
        const icon = document.getElementById('chatToggleIcon');
        
        if (chatMessages.style.display === 'none') {
            chatMessages.style.display = 'flex';
            chatInput.style.display = 'flex';
            icon.classList.remove('fa-chevron-up');
            icon.classList.add('fa-minus');
        } else {
            chatMessages.style.display = 'none';
            chatInput.style.display = 'none';
            icon.classList.remove('fa-minus');
            icon.classList.add('fa-chevron-up');
        }
    }

    function handleEnter(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    }

    function searchRetailer(e) {
        e.preventDefault();
        const q = document.getElementById('retailerSearch').value.trim().toUpperCase();
        if (q) {
            window.location.href = '/retailer/' + q;
        }
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        
        const chatMessages = document.getElementById('chatMessages');
        
        // Add user message
        chatMessages.innerHTML += `<div class="message user">${text}</div>`;
        input.value = '';
        
        // Scroll to bottom
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // Show typing indicator
        const typingId = 'typing-' + Date.now();
        chatMessages.innerHTML += `<div class="message ai" id="${typingId}"><i class="fa-solid fa-ellipsis fa-bounce"></i> Thinking...</div>`;
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
            const response = await fetch('/api/chatbot', {
                method:'POST',
                headers:{
                    'Content-Type':'application/json'
                },
                body:JSON.stringify({
                    message: text
                })
            });

            const data = await response.json();
            
            // Remove typing indicator
            document.getElementById(typingId).remove();

            // Add AI response
            chatMessages.innerHTML += `<div class="message ai">${data.response}</div>`;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        } catch (error) {
            document.getElementById(typingId).remove();
            chatMessages.innerHTML += `<div class="message ai text-danger">Error connecting to AI.</div>`;
        }
    }
</script>

</body>
</html>
