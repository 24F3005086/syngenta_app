<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Syngenta AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }
        .offline-card {
            background: rgba(30,41,59,0.8);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 24px;
            padding: 60px 40px;
            max-width: 500px;
            backdrop-filter: blur(20px);
        }
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        h1 { font-size: 1.8rem; margin-bottom: 12px; color: #f59e0b; }
        p { color: #94a3b8; line-height: 1.7; margin-bottom: 20px; }
        .retry-btn {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .retry-btn:hover { transform: translateY(-2px); }
        .features {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }
        .features h3 { font-size: 0.9rem; color: #6366f1; margin-bottom: 12px; }
        .features li {
            list-style: none;
            padding: 6px 0;
            font-size: 0.85rem;
            color: #64748b;
        }
        .features li::before { content: '✅ '; }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📡</div>
        <h1>You're Offline</h1>
        <p>No internet connection detected. Some features are still available from cached data.</p>
        <a href="/" class="retry-btn" onclick="location.reload(); return false;">🔄 Retry Connection</a>
        <div class="features">
            <h3>Available Offline:</h3>
            <ul>
                <li>Dashboard stats (last cached)</li>
                <li>Map data (last viewed)</li>
                <li>Location filters</li>
                <li>Previously loaded district data</li>
            </ul>
        </div>
    </div>
</body>
</html>
